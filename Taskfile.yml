version: '3'

vars:
  APP_ENV: '{{.APP_ENV | default "production"}}'
  DC: 'docker compose --env-file .env.{{.APP_ENV}} -f compose.yml'
  APP_CONTAINER: 'easylist_app_{{.APP_ENV}}'

tasks:
  vendor:
    desc: "Compile vendor folder"
    cmds:
      - "{{.EXEC_PHP}} composer install"
      - "{{.EXEC_PHP}} touch vendor"
    sources:
      - composer.json
      - composer.lock
    vars:
      EXEC_PHP:
        sh: 'if [ "{{.DOCKER}}" = "true" ]; then echo "docker-compose exec -it php"; else echo ""; fi'

  var:
    desc: "Make sure that folder var exists"
    cmds:
      - mkdir -p var

  up:
    desc: "Запустить все контейнеры (APP_ENV=production|staging)"
    cmds:
      - '{{.DC}} up --detach --remove-orphans'
    deps: [var]

  down:
    desc: "Остановить все контейнеры"
    cmds:
      - '{{.DC}} down --remove-orphans'

  php:
    desc: "Run container in PHP"
    cmds:
      - "{{.EXEC_PHP}} {{.CMD}}"
    vars:
      EXEC_PHP:
        sh: 'if [ "{{.DOCKER}}" = "true" ]; then echo "docker-compose exec -it php"; else echo ""; fi'
      CMD:
        sh: 'echo "{{.CMD}}"'

  restart:
    desc: "Перезапустить контейнер приложения"
    cmds:
      - '{{.DC}} restart app'

  check:
    desc: "Run all checkers"
    cmds:
      - task: composer-validate
      - task: composer-audit
      - task: rector
      - task: phpstan
      - task: audit
      - npm run check
      - task: build

  type-check:
    desc: "Run checker in typescript"
    cmds:
      - npm run typecheck
      - npm run lint

  fix:
    desc: "Run all fixers"
    cmds:
      - task: fixcs
      - task: lintfix
      - task: rector-fix
      - task: composer-normalize

  composer-validate:
    desc: "Validate composer.json and composer.lock using composer validate"
    cmds:
      - "{{.EXEC_PHP}} composer validate --strict --no-check-publish"

  composer-audit:
    desc: "Try to find vulnerabilities in Composer using composer audit"
    cmds:
      - "{{.EXEC_PHP}} composer audit"

  audit:
    desc: "Find all vulnerabilities in front end and backend"
    cmds:
      - task: composer-audit

  generate:
    desc: "Generate list of named routes for frontend"
    cmds:
      - "php artisan ziggy:generate"

  lint:
    desc: "Check PHP code style using linter"
    cmds:
      - "{{.EXEC_PHP}} composer lint"
    deps: [var, vendor]

  lintfix:
    desc: "Check JS code style using prettier"
    cmds:
      - "npm run format"

  eslint:
    desc: "Check JS code style using prettier"
    cmds:
      - "npm run lint:fix"

  phpcs:
    desc: "Check PHP code style using PHP CS Fixer"
    cmds:
      - "{{.EXEC_PHP}} composer phpcs-check"
    deps: [var, vendor]

  fixcs:
    desc: "Fix PHP code style errors using PHP CS Fixer"
    cmds:
      - "{{.EXEC_PHP}} composer phpcs"
    deps: [var, vendor]

  phpstan:
    desc: "Run full static PHP code analysis using PHPStan"
    cmds:
      - "{{.EXEC_PHP}} composer phpstan"
    deps: [var, vendor]

  rector:
    desc: "Run php code analysis using Rector"
    cmds:
      - "{{.EXEC_PHP}} composer rector-check"
    deps: [var, vendor]

  rector-fix:
    desc: "Run code fixing process using Rector"
    cmds:
      - "{{.EXEC_PHP}} composer rector"
    deps: [var, vendor]

  test:
    desc: "Run phpunit tests"
    cmds:
      - "{{.EXEC_PHP}} composer test"

  test-stop:
    desc: "Run phpunit tests"
    cmds:
      - "./vendor/bin/phpunit --stop-on-error --stop-on-failure --colors=always"

  testjs:
    desc: "Run javascript tests"
    cmd: "npm run test"

  composer-normalize:
    desc: "Normalize composer.json"
    cmds:
      - "{{.EXEC_PHP}} composer normalize"
    deps: [vendor]

  start:
    desc: "Запустить Octane локально (FrankenPHP)"
    cmd: "php artisan octane:frankenphp --host=127.0.0.1 --port=8000"

  notstart:
    desc: "Start Reverb notification server"
    cmd: 'php artisan reverb:start --host="0.0.0.0" --port=8080'

  start-dev:
    desc: "Запустить Octane локально с авто-перезагрузкой"
    cmd: "php artisan octane:frankenphp --host=127.0.0.1 --port=8000 --watch"

  clean:
    desc: "Run all cleaning commands"
    cmds:
      - "php artisan optimize:clear"
    vars:
      IMPORT_LIMIT:
        sh: 'echo "${IMPORT_LIMIT}"'

  debug:
    desc: "Run debug command"
    cmd: "php artisan debug"

  install:
    desc: "Первоначальная установка для локальной разработки"
    cmds:
      - "composer install"
      - "npm install"
      - "cp -n .env.example .env || true"
      - "php artisan key:generate"
      - "php artisan migrate:fresh --seed"
      - "php artisan storage:link"
      - "npm run build"

  dev:
    desc: "Запустить всё для локальной разработки (octane + queue + pail + vite)"
    cmd: "composer run dev"

  dev:vite:
    desc: "Запустить только Vite (frontend hot reload)"
    cmd: "npm run dev"

  build:
    desc: "Run in production mode"
    cmd: "npm run build"

  deploy:
    desc: "Run deployment process"
    cmds:
      - "php artisan down --retry=60 --secret=deployment-secret"
      - "sudo chown -R sergey:sergey /var/www/praxis-app"
      - "git fetch --all --prune"
      - "git reset --hard origin/main"
      - "composer install --optimize-autoloader --no-interaction"
      - "npm install"
      - "php artisan migrate --force"
      - "npm run build"
      - "php artisan config:clear"
      - "php artisan cache:clear"
      - "php artisan route:clear"
      - "php artisan view:clear"
      - "php artisan config:cache"
      - "php artisan route:cache"
      - "php artisan view:cache"
      - "php artisan event:cache"
      - "php artisan queue:restart"
      - "sudo supervisorctl restart all"
      - "sudo chown -R sergey:www-data /var/www/praxis-app"
      - "sudo chmod -R 755 /var/www/praxis-app"
      - "sudo chmod -R 775 /var/www/praxis-app/storage"
      - "sudo chmod -R 775 /var/www/praxis-app/bootstrap/cache"
      - "php artisan up"

    env:
      GIT_SSH_COMMAND: 'ssh -i /home/sergey/.ssh/id_ed25519_github -o IdentitiesOnly=yes'
  work:
    desc: "Run queue jobs"
    cmd: "php artisan queue:work"

  status:
    desc: "Статус всех контейнеров"
    cmd: '{{.DC}} ps'

  logs:
    desc: "Логи контейнера (SERVICE=app|worker|scheduler|nginx|db|redis)"
    cmd: '{{.DC}} logs --follow --tail=100 {{.SERVICE | default "app"}}'

  reload:
    desc: "Горячая перезагрузка Octane (без остановки)"
    cmd: '{{.DC}} exec {{.APP_CONTAINER}} php artisan octane:reload'

  all:
    desc: "Run all deployment checks"
    cmds:
      - task: fix
      - task: check
      - task: test

  # ----------------------------------------------------------------------------
  # Docker
  # ----------------------------------------------------------------------------

  docker:build:
    desc: "Собрать все Docker-образы (APP_ENV=production|staging)"
    cmds:
      - '{{.DC}} build'

  docker:build-no-cache:
    desc: "Пересобрать образы без кэша"
    cmds:
      - '{{.DC}} build --no-cache'

  docker:ps:
    desc: "Список контейнеров и их статус"
    cmd: '{{.DC}} ps'

  docker:shell:
    desc: "Открыть bash-сессию внутри контейнера приложения"
    interactive: true
    cmd: '{{.DC}} exec {{.APP_CONTAINER}} bash'

  docker:artisan:
    desc: "Запустить artisan-команду в контейнере (CMD='migrate --force')"
    cmds:
      - '{{.DC}} exec {{.APP_CONTAINER}} php artisan {{.CMD}}'

  docker:migrate:
    desc: "Запустить миграции внутри контейнера"
    cmds:
      - '{{.DC}} exec {{.APP_CONTAINER}} php artisan migrate --force'

  docker:optimize:
    desc: "Запустить php artisan optimize внутри контейнера"
    cmds:
      - '{{.DC}} exec {{.APP_CONTAINER}} php artisan optimize'

  docker:optimize-clear:
    desc: "Очистить все кэши внутри контейнера"
    cmds:
      - '{{.DC}} exec {{.APP_CONTAINER}} php artisan optimize:clear'

  docker:logs:
    desc: "Следить за логами контейнера (SERVICE=app|worker|scheduler|nginx|db|redis)"
    cmd: '{{.DC}} logs --follow --tail=200 {{.SERVICE | default "app"}}'

  docker:restart:
    desc: "Перезапустить конкретный контейнер (SERVICE=app|worker|scheduler)"
    cmds:
      - '{{.DC}} restart {{.SERVICE | default "app"}}'

  docker:prune:
    desc: "Удалить остановленные контейнеры и неиспользуемые образы"
    cmds:
      - docker image prune -f
      - docker container prune -f

  ssh:
    desc: "Connect to server via ssh"
    cmd: "ssh -t sergey@46.225.99.118 'cd /var/www/praxis-app && exec $SHELL -l'"

  context:
    desc: "Generate context files for LLM"
    cmd: "ctx generate"
