server {
    listen 80;
    server_name _;

    # Docker внутренний DNS-резолвер — переспрашивает при каждом запросе,
    # чтобы не кешировать старый IP после пересоздания контейнеров
    resolver 127.0.0.11 valid=5s ipv6=off;

    client_max_body_size 100M;

    # Перенаправление всех запросов на HTTPS (раскомментировать при наличии SSL)
    # return 301 https://$host$request_uri;

    location / {
        set $upstream http://app:9000;
        proxy_pass $upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }
}

