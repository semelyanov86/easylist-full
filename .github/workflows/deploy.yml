name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          set -e
          mkdir -p ~/.ssh
          PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          set -e
          PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          ssh -p "$PORT" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" 'bash -seu' << 'EOF'
          APP=/var/www/easylist/current
          SHARED=/var/www/easylist/shared
          as_site() { sudo -u site_easylist env HOME="$SHARED" "$@"; }

          # 1. Обновить код
          as_site git -C "$APP" fetch --prune origin
          as_site git -C "$APP" reset --hard origin/main

          # 2. Backend-зависимости
          as_site composer install --working-dir="$APP" --no-dev --prefer-dist --optimize-autoloader --no-interaction

          # 3. Frontend: сборка прямо на сервере (Wayfinder-типы генерит vite-плагин).
          #    Octane держит старый код в памяти до reload, поэтому падение сборки
          #    прервёт деплой ДО reload и живой сайт не пострадает.
          as_site sh -c "cd $APP && npm ci && npm run build"

          # 4. Миграции и сброс кэшей
          as_site php "$APP/artisan" migrate --force
          as_site php "$APP/artisan" optimize:clear

          # 5. Graceful-reload Octane (RoadRunner) через systemd
          sudo systemctl reload octane-easylist.service
          EOF
